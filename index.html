<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>돌망이 타이쿤: 인피니티 - 최후의 수호자</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00f3ff">
    <style>
        :root { --neon-blue: #00f3ff; --neon-pink: #ff00ff; --gold: #ffd700; --bg: #0a0a0c; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Pretendard', sans-serif; margin: 0; padding: 15px; overflow-x: hidden; }
        
        /* 메인 게임 레이아웃 */
        .game-layout { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 20px; width: 100%; max-width: 900px; transition: opacity 0.5s; }
        .card { background: #151518; padding: 25px; border-radius: 25px; border: 1px solid #222; box-shadow: 0 10px 40px rgba(0,0,0,0.8); position: relative; display: flex; flex-direction: column; }
        h3 { margin-top: 0; color: var(--neon-blue); font-size: 16px; border-bottom: 1px solid #222; padding-bottom: 12px; }
        .main-stage { text-align: center; padding: 40px 0; background: radial-gradient(circle, #1a1a2e 0%, #0a0a0c 70%); border-radius: 20px; margin-bottom: 20px; }
        #dolmang { font-size: 110px; cursor: pointer; transition: 0.1s; user-select: none; display: inline-block; filter: drop-shadow(0 0 15px rgba(0,243,255,0.4)); }
        #dolmang:active { transform: scale(0.85); }
        .bar-bg { background: #222; height: 8px; border-radius: 4px; overflow: hidden; margin: 5px 0 12px 0; }
        .bar-fill { height: 100%; width: 0%; transition: width 0.2s; background: var(--neon-blue); box-shadow: 0 0 12px var(--neon-blue); }
        .scroll-list { height: 420px; overflow-y: auto; padding-right: 8px; }
        .list-item { background: #1e1e22; padding: 14px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid transparent; }
        .list-item.ready { border: 1px solid var(--neon-pink); background: #251a25; }
        button { background: var(--neon-blue); color: black; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 12px; transition: 0.2s; }
        button:disabled { background: #333; color: #666; cursor: not-allowed; }
        .tab-menu { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab-btn { background: #222; color: #666; flex: 1; border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 13px; }
        .tab-btn.active { background: var(--neon-blue); color: black; }
        #msg { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); color: var(--neon-pink); font-size: 13px; font-weight: bold; background: rgba(10,10,12,0.9); padding: 12px 25px; border-radius: 30px; opacity: 0; transition: 0.3s; z-index: 1000; border: 1px solid var(--neon-pink); text-align: center; }

        /* 🎬 시네마틱 애니메이션 레이어 */
        #ending-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: none; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 9999; overflow: hidden;
        }
        /* 우주 별 가루 배경 */
        #ending-canvas::before {
            content: ''; position: absolute; width: 200%; height: 200%;
            background-image: radial-gradient(white 1px, transparent 1px);
            background-size: 50px 50px; opacity: 0.3; animation: stars-move 20s linear infinite;
        }
        @keyframes stars-move { from { transform: translateY(0); } to { transform: translateY(-500px); } }

        /* 평화로운 지구 (무타격) */
        #cinema-earth { font-size: 180px; position: absolute; bottom: -40px; left: 50%; transform: translateX(-50%); z-index: 5; filter: drop-shadow(0 0 40px #2244ff); transition: 2s; }
        
        /* 다가오는 운석 */
        #cinema-meteor { font-size: 100px; position: absolute; top: -150px; right: -150px; z-index: 10; display: none; }
        
        /* 솟구치는 돌망이 */
        #cinema-dolmang { font-size: 70px; position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); z-index: 15; display: none; }

        /* 섬광 효과 */
        #flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; z-index: 20000; pointer-events: none; transition: 0.2s; }

        /* 애니메이션 키프레임 */
        @keyframes meteor-move {
            0% { transform: translate(0, 0) rotate(0); }
            100% { transform: translate(-450px, 450px) rotate(360deg); }
        }
        @keyframes dolmang-move {
            0% { transform: translate(-50%, 0) scale(1); }
            100% { transform: translate(-50%, -420px) scale(1.5); }
        }
        .shatter-action { animation: shatter-anim 1s forwards; }
        @keyframes shatter-anim { 0% { transform: scale(1.5); opacity: 1; filter: brightness(10); } 100% { transform: scale(6); opacity: 0; filter: blur(20px); } }
        .shake-screen { animation: shake-anim 0.1s infinite; }
        @keyframes shake-anim { 0% { transform: translate(4px, 4px); } 100% { transform: translate(-4px, -4px); } }

        /* 엔딩 텍스트 */
        #final-text-area { position: relative; z-index: 30000; opacity: 0; transition: 2s; text-align: center; }
    </style>
</head>
<body>

<div id="ending-canvas">
    <div id="flash"></div>
    <div id="cinema-earth">🌍</div>
    <div id="cinema-meteor">☄️</div>
    <div id="cinema-dolmang">🪨</div>
    
    <div id="final-text-area">
        <h1 style="color: var(--gold); font-size: 38px; text-shadow: 0 0 20px var(--gold); margin-bottom: 10px;">지구를 구한 영웅</h1>
        <p style="font-size: 18px; line-height: 1.8; color: #ddd;">
            돌망이는 운석과 충돌하여 부셔졌지만<br>
            우리의 지구를 완벽하게 지켰습니다.<br><br>
            <strong>우리는 당신과 돌망이를 영원히 잊지 않겠습니다.</strong>
        </p>
        <button onclick="location.reload()" style="background: var(--neon-pink); color: white; padding: 15px 40px; border-radius: 50px; font-size: 18px; margin-top: 25px; border:none; cursor:pointer;">처음부터 다시 만나기</button>
    </div>
</div>

<div class="game-layout" id="game-ui">
    <div class="card">
        <div style="font-size: 28px; color: var(--gold); font-weight: 900; margin-bottom: 5px;">💰 <span id="coins">0</span></div>
        <div id="level-info" style="color: var(--neon-blue); font-size: 15px; font-weight: 800; margin-bottom: 10px;">LV.1 시작</div>
        <div class="main-stage"><div id="dolmang" onclick="clickDolmang()">🪨</div></div>
        
        <div style="font-size: 11px; color:#888;">EXP: <span id="exp-text">0 / 100</span></div>
        <div class="bar-bg"><div id="exp-bar" class="bar-fill"></div></div>
        
        <div style="font-size: 11px; color:#888;">HUNGER: <span id="hunger-text">100%</span></div>
        <div class="bar-bg"><div id="hunger-bar" class="bar-fill" style="background: var(--neon-pink);"></div></div>
        
        <div style="display: flex; gap: 10px; margin-top: auto; padding-top: 10px;">
            <button onclick="saveGame()">💾 저장</button>
            <button onclick="resetGame()" style="background:#311; color:#fff;">🧹 초기화</button>
        </div>
    </div>

    <div class="card">
        <div class="tab-menu">
            <button class="tab-btn active" onclick="showTab('shop')">상점</button>
            <button class="tab-btn" onclick="showTab('missions')">미션</button>
            <button class="tab-btn" onclick="showTab('skins')">도감</button>
        </div>
        
        <div id="tab-shop" class="scroll-list">
            <h3 style="color:var(--gold);">🎰 럭키 가챠 <button onclick="drawGacha()" style="background:var(--gold); margin-left:10px;">5,000원</button></h3>
            <div id="stone-shop"></div>
            <h3 style="margin-top:20px;">🤖 자동화 시설</h3>
            <div id="item-shop"></div>
        </div>
        <div id="tab-missions" class="scroll-list" style="display:none;"><h3>🎯 업적 보상</h3><div id="mission-list"></div></div>
        <div id="tab-skins" class="scroll-list" style="display:none;"><h3>🎭 획득 스킨</h3><div id="skin-grid"></div></div>
    </div>
</div>

<div id="msg"></div>

<script>
    const stoneData = [
        { name: "평범한 돌", icon: "🪨", price: 0, lv: 1 },
        { name: "고대 석상", icon: "🗿", price: 2000, lv: 5 },
        { name: "단단한 벽돌", icon: "🧱", price: 10000, lv: 10 },
        { name: "영롱한 보석", icon: "💎", price: 50000, lv: 20 },
        { name: "설산의 바위", icon: "🏔️", price: 150000, lv: 30 },
        { name: "인공 위성", icon: "🛰️", price: 500000, lv: 40 },
        { name: "UFO", icon: "🛸", price: 1200000, lv: 50 },
        { name: "블랙홀", icon: "🌀", price: 5000000, lv: 65 },
        { name: "양자 핵", icon: "⚛️", price: 20000000, lv: 80 },
        { name: "최후의 성좌", icon: "✨", price: 100000000, lv: 95 }
    ];

    const missionData = [
        { id: 'm1', name: '첫 클릭', goal: 100, type: 'click', reward: 3000 },
        { id: 'm2', name: '진화의 시작', goal: 10, type: 'lv', reward: 10000 },
        { id: 'm3', name: '자본가', goal: 1000000, type: 'money', reward: 150000 },
        { id: 'm4', name: '중간 관리자', goal: 50, type: 'lv', reward: 1000000 },
        { id: 'm5', name: '지구의 희망', goal: 100, type: 'lv', reward: 50000000 }
    ];

    let state = {
        coins: parseInt(localStorage.getItem('dt_coins')) || 0,
        totalEarned: parseInt(localStorage.getItem('dt_total_earned')) || 0,
        totalClicks: parseInt(localStorage.getItem('dt_total_clicks')) || 0,
        exp: parseFloat(localStorage.getItem('dt_exp')) || 0, 
        level: parseInt(localStorage.getItem('dt_lv')) || 1,
        hunger: 100, cps: parseInt(localStorage.getItem('dt_cps')) || 0,
        ownedStones: JSON.parse(localStorage.getItem('dt_stones')) || ["🪨"],
        currentStone: localStorage.getItem('dt_cur_stone') || "🪨",
        ownedSkins: JSON.parse(localStorage.getItem('dt_skins')) || [0],
        currentSkin: parseInt(localStorage.getItem('dt_cur_skin')) || 0,
        completedMissions: JSON.parse(localStorage.getItem('dt_mission_done')) || [],
        isEnding: false
    };

    const skins = Array.from({length: 110}, (_, i) => ({ id: i, name: i >= 100 ? `전설 #${i-99}` : `스킨 #${i+1}`, price: (i+1)*500, reqLv: i >= 100 ? 0 : i, filter: `hue-rotate(${i*137}deg)`, isGacha: i >= 100 }));

    function init() {
        renderStoneShop(); renderItemShop(); renderMissions(); renderSkins(); updateUI();
        setInterval(gameLoop, 1000);
    }

    function gameLoop() {
        if(state.isEnding) return;
        if(state.hunger > 0) {
            state.coins += state.cps; state.totalEarned += state.cps;
            state.exp += (state.cps * 0.15); state.hunger -= 0.35;
        }
        checkLevelUp(); updateUI();
    }

    function clickDolmang() {
        if(state.isEnding || state.hunger <= 0) return;
        if ('vibrate' in navigator) navigator.vibrate(10);
        let power = 1 + Math.floor(state.level * 1.2);
        state.coins += power; state.totalEarned += power;
        state.totalClicks++; state.exp += 20; state.hunger -= 0.12;
        updateUI(); renderMissions();
    }

    function checkLevelUp() {
        if(state.exp >= state.level * 100) {
            state.exp = 0; state.level++;
            if (state.level >= 100) triggerEnding();
            else { showMsg(`⭐ LEVEL UP! [${state.level}] ⭐`); renderStoneShop(); renderMissions(); }
        }
    }

    // --- 🎬 시네마틱 엔딩 로직 ---
    function triggerEnding() {
        state.isEnding = true;
        document.getElementById('game-ui').style.opacity = '0';
        
        const canvas = document.getElementById('ending-canvas');
        const meteor = document.getElementById('cinema-meteor');
        const cinemaDolmang = document.getElementById('cinema-dolmang');
        const flash = document.getElementById('flash');
        const earth = document.getElementById('cinema-earth');

        canvas.style.display = 'flex';
        cinemaDolmang.innerText = state.currentStone;
        cinemaDolmang.style.filter = skins[state.currentSkin].filter;

        // 1. 운석 낙하 (1초 후)
        setTimeout(() => {
            meteor.style.display = 'block';
            meteor.style.animation = 'meteor-move 2.2s linear forwards';
            if ('vibrate' in navigator) navigator.vibrate([100, 50, 100]);
        }, 1000);

        // 2. 돌망이 솟구침 (운석이 중간에 왔을 때)
        setTimeout(() => {
            cinemaDolmang.style.display = 'block';
            cinemaDolmang.style.animation = 'dolmang-move 0.6s ease-out forwards';
        }, 2500);

        // 3. 충돌 지점 (콰아앙!)
        setTimeout(() => {
            flash.style.opacity = '1';
            document.body.classList.add('shake-screen');
            if ('vibrate' in navigator) navigator.vibrate(800);
            
            setTimeout(() => {
                flash.style.opacity = '0';
                meteor.style.display = 'none';
                cinemaDolmang.classList.add('shatter-action');
                earth.style.filter = "drop-shadow(0 0 60px #00f3ff)"; // 지구 정화 효과
            }, 200);
        }, 3050);

        // 4. 엔딩 텍스트 등장
        setTimeout(() => {
            document.body.classList.remove('shake-screen');
            document.getElementById('final-text-area').style.opacity = '1';
        }, 4500);
    }

    // --- 나머지 상점 및 UI 로직 (동일) ---
    function renderStoneShop() {
        const shop = document.getElementById('stone-shop');
        shop.innerHTML = stoneData.map(s => {
            const isOwned = state.ownedStones.includes(s.icon);
            const canUnlock = state.level >= s.lv;
            return `<div class="list-item"><span>${s.icon}</span><div style="flex:1; margin-left:12px;"><b>${s.name}</b><br><small>LV.${s.lv}</small></div>
                <button onclick="buyStone('${s.icon}', ${s.price})" ${!isOwned && (!canUnlock || state.coins < s.price) ? 'disabled' : ''}>
                    ${isOwned ? (state.currentStone === s.icon ? '장착중' : '장착') : (canUnlock ? s.price.toLocaleString()+'원' : '잠김')}
                </button></div>`;
        }).join('');
    }

    function buyStone(icon, price) {
        if(!state.ownedStones.includes(icon)) { state.coins -= price; state.ownedStones.push(icon); }
        state.currentStone = icon; updateUI(); renderStoneShop(); renderSkins();
    }

    function renderMissions() {
        const list = document.getElementById('mission-list');
        list.innerHTML = missionData.map(m => {
            const isDone = state.completedMissions.includes(m.id);
            let cur = m.type === 'click' ? state.totalClicks : (m.type === 'money' ? state.totalEarned : state.level);
            const isReady = !isDone && cur >= m.goal;
            return `<div class="list-item ${isReady ? 'ready' : ''}"><div><b>${m.name}</b><br><small>${Math.min(cur, m.goal).toLocaleString()}/${m.goal.toLocaleString()}</small></div>
                <button onclick="claimMission('${m.id}', ${m.reward})" ${!isReady ? 'disabled' : ''}>${isDone ? '완료' : '보상받기'}</button></div>`;
        }).join('');
    }

    function claimMission(id, reward) {
        state.completedMissions.push(id); state.coins += reward;
        showMsg(`🎁 보상획득!`); renderMissions(); updateUI();
    }

    function renderItemShop() {
        const items = [{ id: 'ant', name: '개미 일꾼', price: 200, cps: 5 }, { id: 'drill', name: '차원 드릴', price: 25000, cps: 800 }, { id: 'star', name: '중성자 별', price: 1000000, cps: 20000 }];
        document.getElementById('item-shop').innerHTML = items.map(it => `<div class="list-item"><span>${it.name} (+${it.cps}/s)</span><button onclick="buyCps(${it.price}, ${it.cps})">${it.price.toLocaleString()}원</button></div>`).join('') + `<div class="list-item"><span>🍱 우주 도시락</span><button onclick="buyFood(100)">100원</button></div>`;
    }

    function buyCps(p, c) { if(state.coins >= p) { state.coins -= p; state.cps += c; updateUI(); } }
    function buyFood(p) { if(state.coins >= p) { state.coins -= p; state.hunger = 100; updateUI(); } }

    function drawGacha() {
        if (state.coins < 5000) return showMsg("돈 부족!");
        state.coins -= 5000; const won = skins[100 + Math.floor(Math.random()*10)];
        if (!state.ownedSkins.includes(won.id)) state.ownedSkins.push(won.id);
        showMsg(`🎰 가챠! [${won.name}]`); renderSkins(); updateUI();
    }

    function renderSkins() {
        const grid = document.getElementById('skin-grid');
        grid.innerHTML = skins.map(s => {
            const isOwned = state.ownedSkins.includes(s.id);
            return `<div class="list-item"><span>${state.currentStone}</span><div style="flex:1; margin-left:10px;">${s.name}</div>
                <button onclick="handleSkin(${s.id},${s.price},${s.reqLv})" ${!isOwned && s.isGacha?'disabled':''}>${isOwned ? (state.currentSkin === s.id ? '장착중' : '장착') : (s.isGacha ? '뽑기전용' : s.price.toLocaleString()+'원')}</button></div>`;
        }).join('');
    }

    function handleSkin(id, p, r) { if(state.ownedSkins.includes(id)) state.currentSkin = id; else if(state.coins >= p && state.level >= r) { state.coins -= p; state.ownedSkins.push(id); state.currentSkin = id; } updateUI(); renderSkins(); }

    function updateUI() {
        document.getElementById('coins').innerText = Math.floor(state.coins).toLocaleString();
        document.getElementById('exp-bar').style.width = (state.exp / (state.level * 100) * 100) + '%';
        document.getElementById('hunger-bar').style.width = state.hunger + '%';
        document.getElementById('dolmang').innerText = state.currentStone;
        document.getElementById('dolmang').style.filter = skins[state.currentSkin].filter;
        document.getElementById('level-info').innerText = `LV.${state.level} [${state.currentStone}]`;
        document.getElementById('exp-text').innerText = `${Math.floor(state.exp)} / ${state.level * 100}`;
        document.getElementById('hunger-text').innerText = `${Math.floor(state.hunger)}%`;
    }

    function showTab(t) { ['shop', 'missions', 'skins'].forEach(tab => { document.getElementById(`tab-${tab}`).style.display = (tab === t) ? 'block' : 'none'; }); }
    function showMsg(m) { const b = document.getElementById('msg'); b.innerHTML = m; b.style.opacity = 1; setTimeout(() => b.style.opacity = 0, 2000); }
    
    function saveGame() {
        localStorage.setItem('dt_coins', state.coins); localStorage.setItem('dt_total_earned', state.totalEarned); localStorage.setItem('dt_lv', state.level); localStorage.setItem('dt_exp', state.exp); localStorage.setItem('dt_cps', state.cps); localStorage.setItem('dt_stones', JSON.stringify(state.ownedStones)); localStorage.setItem('dt_cur_stone', state.currentStone); localStorage.setItem('dt_skins', JSON.stringify(state.ownedSkins)); localStorage.setItem('dt_cur_skin', state.currentSkin); localStorage.setItem('dt_mission_done', JSON.stringify(state.completedMissions));
        showMsg("저장 완료!");
    }

    function resetGame() { if(confirm("초기화하시겠습니까?")) { localStorage.clear(); location.reload(); } }

    init();
</script>

</body>
</html>
