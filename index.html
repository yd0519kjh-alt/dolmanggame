<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>돌망이 타이쿤: 인피니티 - 최후의 수호자</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00f3ff">

    <style>
        :root { --neon-blue: #00f3ff; --neon-pink: #ff00ff; --gold: #ffd700; --bg: #0a0a0c; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Pretendard', sans-serif; margin: 0; padding: 15px; overflow-x: hidden; }
        
        .game-layout { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 20px; width: 100%; max-width: 900px; transition: opacity 0.5s; }
        .card { background: #151518; padding: 25px; border-radius: 25px; border: 1px solid #222; box-shadow: 0 10px 40px rgba(0,0,0,0.8); position: relative; display: flex; flex-direction: column; }
        h3 { margin-top: 0; color: var(--neon-blue); font-size: 16px; border-bottom: 1px solid #222; padding-bottom: 12px; }
        
        .main-stage { text-align: center; padding: 40px 0; background: radial-gradient(circle, #1a1a2e 0%, #0a0a0c 70%); border-radius: 20px; margin-bottom: 20px; position: relative; }
        #dolmang { font-size: 110px; cursor: pointer; transition: 0.1s; user-select: none; display: inline-block; filter: drop-shadow(0 0 10px rgba(0,243,255,0.3)); }
        #dolmang:active { transform: scale(0.85); }

        .bar-container { margin: 12px 0; }
        .label { font-size: 11px; color: #888; display: flex; justify-content: space-between; margin-bottom: 5px; }
        .bar-bg { background: #222; height: 8px; border-radius: 4px; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; transition: width 0.2s; background: var(--neon-blue); }

        .scroll-list { height: 380px; overflow-y: auto; padding-right: 8px; }
        .list-item { background: #1e1e22; padding: 14px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid transparent; }
        button { background: var(--neon-blue); color: black; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 12px; }
        button:disabled { background: #333; color: #666; cursor: not-allowed; }

        .tab-menu { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { background: #222; color: #666; flex: 1; border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: var(--neon-blue); color: black; box-shadow: 0 0 15px rgba(0,243,255,0.4); }

        #msg { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); color: var(--neon-pink); font-size: 13px; font-weight: bold; background: rgba(10,10,12,0.9); padding: 12px 25px; border-radius: 30px; opacity: 0; transition: 0.3s; z-index: 1000; text-align: center; }

        /* 🌠 엔딩 연출용 스타일 */
        #ending-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 9999; display: none;
            flex-direction: column; justify-content: center; align-items: center;
            overflow: hidden;
        }
        #meteor { font-size: 150px; position: absolute; top: -200px; right: -200px; display: none; transition: transform 2s ease-in; }
        #final-dolmang { font-size: 120px; transition: all 0.5s; z-index: 10001; }
        .shake { animation: shake-anim 0.1s infinite; }
        @keyframes shake-anim { 0% { transform: translate(2px, 2px); } 50% { transform: translate(-2px, -2px); } 100% { transform: translate(2px, -2px); } }
        .shatter { animation: shatter-anim 1.5s forwards; }
        @keyframes shatter-anim {
            0% { transform: scale(1); opacity: 1; filter: brightness(10); }
            100% { transform: scale(5); opacity: 0; filter: blur(20px); }
        }
        #ending-text {
            font-size: 20px; line-height: 1.8; text-align: center; color: white;
            opacity: 0; transition: opacity 2s; padding: 20px; max-width: 600px;
        }
    </style>
</head>
<body>

<div id="ending-overlay">
    <div id="meteor">☄️</div>
    <div id="final-dolmang">👽</div>
    <div id="ending-text">
        <h1 style="color: var(--gold); text-shadow: 0 0 20px var(--gold);">지구를 구한 영웅</h1>
        지구에 거대한 운석이 떨어집니다.<br>
        돌망이는 운석과 충돌하여 부셔졌지만<br>
        우리의 지구를 지켰습니다.<br><br>
        <strong>우리는 돌망이를 영원히 잊지 않을 것입니다.</strong><br><br>
        <button onclick="location.reload()" style="background: var(--neon-pink); color: white; padding: 15px 30px; font-size: 18px; border-radius: 50px;">다시 만나러 가기</button>
    </div>
</div>

<div class="game-layout" id="game-ui">
    <div class="card">
        <div style="font-size: 28px; color: var(--gold); font-weight: 900; margin-bottom: 5px;">💰 <span id="coins">0</span></div>
        <div id="level-info" style="color: var(--neon-blue); font-size: 15px; margin-bottom: 15px; font-weight: 800;">LV.1 평범한 돌멩이</div>
        <div class="main-stage"><div id="dolmang" onclick="clickDolmang()">🪨</div></div>
        <div class="bar-container">
            <div class="label"><span>EXP</span><span id="exp-text">0 / 100</span></div>
            <div class="bar-bg"><div id="exp-bar" class="bar-fill"></div></div>
        </div>
        <div class="bar-container">
            <div class="label"><span>HUNGER</span><span id="hunger-text">100%</span></div>
            <div class="bar-bg"><div id="hunger-bar" class="bar-fill" style="background: var(--neon-pink);"></div></div>
        </div>
        <div style="display: flex; gap: 10px; margin-top: auto;">
            <button onclick="saveGame()" style="flex:1; background:#222; color:#fff;">💾 저장</button>
            <button onclick="resetGame()" style="flex:1; background:#311; color:#fff;">🧹 초기화</button>
        </div>
    </div>

    <div class="card">
        <div class="tab-menu">
            <button class="tab-btn active" id="tab-btn-shop" onclick="showTab('shop')">상점 & 뽑기</button>
            <button class="tab-btn" id="tab-btn-skins" onclick="showTab('skins')">스킨 도감</button>
        </div>
        <div id="tab-shop" class="scroll-list">
            <div class="list-item" style="border: 2px solid var(--gold); background: #252515;">
                <div style="text-align:left;">
                    <div style="font-weight:bold; color:var(--gold);">💎 행운 뽑기</div>
                    <div style="font-size:10px; color:#aaa;">1% 확률 전설 스킨</div>
                </div>
                <button onclick="drawGacha()" style="background:var(--gold);">5,000원</button>
            </div>
            <div id="shop-items"></div>
            <div id="achievements"></div>
        </div>
        <div id="tab-skins" class="scroll-list" style="display:none;"><div id="skin-grid"></div></div>
    </div>
</div>

<div id="msg"></div>

<script>
    const evoIcons = ["🪨","🗿","🧱","💎","🌋","🏔️","🏰","🪐","🛰️","🛸","🌠","☄️","🌀","🧬","⚛️","🔮","☀️","🌌","👾","👑","👽"];
    const evoNames = ["돌멩이","고대석","벽돌","보석","마그마","설산","성곽","행성","위성","UFO","유성","혜성","블랙홀","DNA","원자","마법구","태양","은하","에일리언","황제","지구의 수호신"];

    let state = {
        coins: parseInt(localStorage.getItem('dt_coins')) || 0,
        totalEarned: parseInt(localStorage.getItem('dt_total_earned')) || 0,
        totalClicks: parseInt(localStorage.getItem('dt_total_clicks')) || 0,
        exp: parseFloat(localStorage.getItem('dt_exp')) || 0, 
        level: parseInt(localStorage.getItem('dt_lv')) || 1,
        hunger: 100, 
        cps: parseInt(localStorage.getItem('dt_cps')) || 0,
        ownedSkins: JSON.parse(localStorage.getItem('dt_skins')) || [0],
        currentSkin: parseInt(localStorage.getItem('dt_cur_skin')) || 0,
        achievements: JSON.parse(localStorage.getItem('dt_achieve')) || [],
        isEnding: false
    };

    const skins = Array.from({length: 110}, (_, i) => ({
        id: i, name: i >= 100 ? `전설 #${i-99}` : `스킨 #${i + 1}`,
        price: (i + 1) * 300, reqLv: i >= 100 ? 0 : i,
        filter: `hue-rotate(${i*137}deg) brightness(${i>=100?1.5:1})`, isGacha: i>=100
    }));

    function init() { renderShop(); renderSkins(); renderAchievements(); updateUI(); setInterval(gameLoop, 1000); }

    function gameLoop() {
        if(state.isEnding) return;
        if(state.hunger > 0) {
            state.coins += state.cps; state.totalEarned += state.cps; state.exp += (state.cps * 0.1); state.hunger -= 0.35;
        }
        checkLevelUp();
        updateUI();
    }

    function checkLevelUp() {
        let maxExp = state.level * 100;
        if(state.exp >= maxExp) {
            state.exp = 0; state.level++;
            if (state.level >= 100) triggerEnding(); // 🚀 100레벨 엔딩 발동!
            else showMsg(`⭐ LEVEL UP! [${state.level}] ⭐`);
        }
    }

    // 🌌 주인님의 시나리오: 희생 엔딩 로직
    function triggerEnding() {
        state.isEnding = true;
        document.getElementById('game-ui').style.opacity = '0';
        const overlay = document.getElementById('ending-overlay');
        const meteor = document.getElementById('meteor');
        const finalDolmang = document.getElementById('final-dolmang');
        const endingText = document.getElementById('ending-text');

        overlay.style.display = 'flex';

        // 1단계: 운석 낙하 시작
        setTimeout(() => {
            meteor.style.display = 'block';
            if ('vibrate' in navigator) navigator.vibrate([100, 100, 100, 100, 500]);
            setTimeout(() => {
                meteor.style.transform = 'translate(-800px, 800px)';
            }, 100);
        }, 1000);

        // 2단계: 충돌 및 화면 진동
        setTimeout(() => {
            document.body.classList.add('shake');
            if ('vibrate' in navigator) navigator.vibrate([1000, 500, 1000]);
        }, 2800);

        // 3단계: 돌망이 파괴 (산산조각)
        setTimeout(() => {
            meteor.style.display = 'none';
            finalDolmang.classList.add('shatter');
            document.body.style.background = "white"; // 섬광 효과
            setTimeout(() => { document.body.style.background = "black"; }, 100);
        }, 3000);

        // 4단계: 감동의 텍스트 등장
        setTimeout(() => {
            document.body.classList.remove('shake');
            endingText.style.opacity = '1';
        }, 4500);
    }

    function clickDolmang() {
        if(state.isEnding || state.hunger <= 0) return;
        if ('vibrate' in navigator) navigator.vibrate(10);
        let power = 1 + Math.floor(state.level/2);
        state.coins += power; state.totalEarned += power; state.totalClicks++; state.exp += 15; state.hunger -= 0.1;
        updateUI();
    }

    function drawGacha() {
        if (state.coins < 5000) return showMsg("5,000원이 필요합니다!");
        state.coins -= 5000;
        const wonSkin = skins[100 + Math.floor(Math.random()*10)];
        if (!state.ownedSkins.includes(wonSkin.id)) state.ownedSkins.push(wonSkin.id);
        showMsg(`✨ 획득: ${wonSkin.name}`);
        renderSkins(); updateUI();
    }

    function renderSkins() {
        const grid = document.getElementById('skin-grid');
        grid.innerHTML = skins.map(s => {
            const isOwned = state.ownedSkins.includes(s.id);
            return `<div class="list-item ${isOwned?'owned':''}">
                <span style="filter:${s.filter}; font-size:24px;">${evoIcons[Math.min(Math.floor(state.level/5), 20)]}</span>
                <div style="flex:1; margin-left:10px;">${s.name}</div>
                <button onclick="handleSkin(${s.id},${s.price},${s.reqLv})" ${!isOwned && s.isGacha?'disabled':''}>
                    ${isOwned?'장착':(s.isGacha?'가챠전용':s.price+'원')}
                </button>
            </div>`;
        }).join('');
    }

    function handleSkin(id, p, r) {
        if(state.ownedSkins.includes(id)) { state.currentSkin = id; }
        else if(state.coins >= p && state.level >= r) { state.coins -= p; state.ownedSkins.push(id); state.currentSkin = id; }
        updateUI(); renderSkins();
    }

    function renderShop() {
        const items = [{ id: 'ant', name: '일꾼 개미', price: 200, cps: 5 }, { id: 'drill', name: '초강력 드릴', price: 10000, cps: 500 }];
        document.getElementById('shop-items').innerHTML = items.map(it => `
            <div class="list-item"><span>${it.name} (+${it.cps}/s)</span><button onclick="buyCps(${it.price}, ${it.cps})">${it.price}원</button></div>
        `).join('') + `<div class="list-item"><span>🍱 비료</span><button onclick="buyFood(100)">100원</button></div>`;
    }

    function buyCps(p, c) { if(state.coins >= p) { state.coins -= p; state.cps += c; updateUI(); } }
    function buyFood(p) { if(state.coins >= p) { state.coins -= p; state.hunger = 100; updateUI(); } }

    function updateUI() {
        document.getElementById('coins').innerText = Math.floor(state.coins).toLocaleString();
        document.getElementById('exp-bar').style.width = (state.exp / (state.level * 100) * 100) + '%';
        document.getElementById('hunger-bar').style.width = state.hunger + '%';
        let idx = Math.min(Math.floor(state.level/5), 20);
        document.getElementById('dolmang').innerText = evoIcons[idx];
        document.getElementById('dolmang').style.filter = skins[state.currentSkin].filter;
        document.getElementById('level-info').innerText = `LV.${state.level} ${evoNames[idx]}`;
        document.getElementById('exp-text').innerText = `${Math.floor(state.exp)} / ${state.level * 100}`;
    }

    function showTab(t) {
        document.getElementById('tab-shop').style.display = t === 'shop' ? 'block' : 'none';
        document.getElementById('tab-skins').style.display = t === 'skins' ? 'block' : 'none';
        document.getElementById('tab-btn-shop').classList.toggle('active', t === 'shop');
        document.getElementById('tab-btn-skins').classList.toggle('active', t === 'skins');
    }

    function showMsg(m) { const msgBox = document.getElementById('msg'); msgBox.innerHTML = m; msgBox.style.opacity = 1; setTimeout(() => msgBox.style.opacity = 0, 2500); }
    function saveGame() { localStorage.setItem('dt_coins', state.coins); localStorage.setItem('dt_lv', state.level); localStorage.setItem('dt_skins', JSON.stringify(state.ownedSkins)); showMsg("저장 완료!"); }
    function resetGame() { if(confirm("초기화?")) { localStorage.clear(); location.reload(); } }
    function renderAchievements() { /* 업적 관련 로직 동일 */ }

    init();
</script>

</body>
</html>
